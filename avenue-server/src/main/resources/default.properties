server.packet.max-size=512
server.packet.drop-unknown=true
server.port=4180

# Per-client outbound queue (head-of-line-blocking protection).
# Capacity = max buffered packets per client; offer-timeout-ms = how long a producer
# waits for free space before the slow client is disconnected.
server.outbound.queue.capacity=1024
server.outbound.queue.offer-timeout-ms=100

# Disable Nagle's algorithm on accepted client sockets so small pub/sub frames flush
# immediately (latency over throughput). Default true.
server.tcp-nodelay=true

# Write-batching (write-coalescing) for the per-client outbound writer: how many already-queued
# frames the writer drains and writes into a buffered stream before issuing a single flush. At low
# load a batch is just one frame (no added latency); under load one flush amortizes many frames,
# cutting syscalls / TCP segments. 1 reproduces the legacy per-frame flush (batching off).
server.batch.max-frames=64

# Inline-delivery fan-out guard: a local publish is delivered inline on the publisher's reader
# thread (saving a task allocation + a thread hop per publish) as long as the topic has at most this
# many subscribers. Above the threshold the fan-out is handed to the shared executor so a single
# huge fan-out cannot monopolize one reader thread. Default 1024.
server.inline-delivery.max-fanout=1024

server.authentication.secret=${AUTHENTICATION_SECRET}
server.authentication.token=${AUTHENTICATION_TOKEN}

# --- Wave 5: Liveness / connection limits (E16) -------------------------------
# Socket read idle-timeout in ms. A connection with no inbound bytes within this
# window is treated as dead and closed. 0 disables the idle-timeout entirely.
server.client.idle-timeout-ms=60000
# Maximum number of concurrent client connections. 0 means unlimited.
server.max-connections=10000

# --- Wave 5: Backpressure policy (E17) ----------------------------------------
# What to do when a client's bounded outbound queue stays full beyond the offer
# timeout: DISCONNECT_SLOW_CONSUMER (default) or DROP_MESSAGE.
server.backpressure.policy=DISCONNECT_SLOW_CONSUMER

# --- Wave 5: Metrics (E20) ----------------------------------------------------
# Interval (seconds) for the periodic metrics log line. 0 disables periodic logging.
server.metrics.log-interval-seconds=30

# --- Wave 5: TLS for the client port (E14) ------------------------------------
# When enabled the client port is an SSLServerSocket using the given PKCS12 keystore.
server.tls.enabled=false
server.tls.keystore-path=
server.tls.keystore-password=

# --- Phase C: at-least-once delivery (replay buffer / ACKs / ordering) --------
# Per-target replay buffer capacity (max buffered un-acked messages). Hard memory bound.
cluster.replay.capacity=65536
# Backpressure policy when the replay ring is full: BLOCK (wait, then degrade to gap) or DROP_GAP.
cluster.replay.backpressure.policy=BLOCK
# How long (ms) a writer waits for ring space under BLOCK before degrading that entry to a gap.
cluster.replay.offer-timeout-ms=1000
# Cumulative ACK send interval (ms). The receiver advertises its contiguous high-water mark.
cluster.ack-interval-ms=200
# Strict ordering: when true the receiver holds out-of-order seqs until contiguous before
# delivering; when false it delivers immediately (gaps filled by backfill, dupes dropped).
cluster.strict-ordering=false
# How long (ms) a per-target replay buffer survives without a reconnect before it is freed.
cluster.origin.expiry-ms=300000

# --- Phase D: interest-based routing -----------------------------------------
# Publishes are forwarded only to nodes that have a subscriber for the topic. Interest is
# propagated via best-effort deltas plus a periodic full-state anti-entropy sync below.
# Period (ms) of the anti-entropy full interest-state sync to every peer (heals lost deltas).
cluster.interest.sync-interval-ms=10000
# Grace window (ms) after an interest topology change during which a node floods the affected
# topic to ALL peers, closing the ~RTT subscribe/publish race. 0 disables it (no extra traffic).
cluster.interest.broadcast-grace-ms=0

# --- Phase E: SWIM gossip membership -----------------------------------------
cluster.swim.probe-interval-ms=1000
cluster.swim.probe-timeout-ms=500
cluster.swim.indirect-probe-count=3
cluster.swim.suspicion-timeout-ms=5000
cluster.swim.gossip-fanout=4
cluster.swim.dead-member-timeout-ms=30000
# Advertised host for this node (empty = auto-detect local IP)
cluster.advertised-host=
# Maximum frame size for cluster links (larger than server.packet.max-size to allow JoinAck member lists)
cluster.packet.max-size=1048576

# --- Write-batching (write-coalescing) for the cluster writer ----------------
# Max frames the cluster PeerLink writer drains and writes into a buffered stream before a single
# flush. At low load a batch is one frame (no added latency); under load one flush amortizes many
# frames -> far fewer syscalls / TCP segments. 1 reproduces the legacy per-frame flush (batching off).
cluster.batch.max-frames=64
# Optional linger window (microseconds) the writer may park to accumulate more frames before
# flushing. 0 (default) = purely opportunistic, no artificial wait, no latency regression.
cluster.batch.max-delay-micros=0

# --- Phase F: Admin HTTP introspection (read-only) ----------------------------
# A dependency-free JDK HttpServer exposing read-only GET endpoints (/health, /metrics,
# /metrics/prometheus, /cluster/members, /cluster/routing, /cluster/peers). Disabled by
# default and bound to loopback only. Set a secret to require the X-Admin-Secret header.
admin.http.enabled=false
admin.http.port=0
admin.http.bind-address=127.0.0.1
admin.http.secret=

# --- Wave 5: TLS for the cluster transport (E14) ------------------------------
# Keystore is used by the accepting side, truststore by the connecting side.
cluster.tls.enabled=false
cluster.tls.keystore-path=
cluster.tls.keystore-password=
cluster.tls.truststore-path=
cluster.tls.truststore-password=
